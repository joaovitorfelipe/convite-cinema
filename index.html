<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Convite pro Cinema</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
<h1>Convite para o cinema 🎬</h1>

<div class="card">
<h2>Filme: Supergirl</h2>
<p>📅 Data: Quarta-Feira</p>
<p>🕒 Horário: 19:00</p>
<p>📍 Local: Cinépolis</p>
</div>

<div class="buttons">
    <button id="sim">Sim ❤️</button>
    <button id="nao">Não 🥺</button>
</div>

<div id="overlay">
    <div class="modal">
        <h2 id="mensagem">Resposta enviada ❤️</h2>
        <p>Obrigado por responder!</p>
    </div>
</div>


<script type="module" src="./firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
